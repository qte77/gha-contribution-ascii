name: Test Action (Dry Run)
on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to render"
        required: true
        default: "HI"
      start_date:
        description: "Start date (YYYY-MM-DD), defaults to today"
        required: false
      inverse:
        description: "Invert colors"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: qte77/gha-contribution-ascii@v2.0.1
        with:
          TEXT: ${{ inputs.text }}
          TOKEN: ${{ secrets.CONTRIBUTION_PAT }}
          START_DATE: ${{ inputs.start_date }}
          DRY_RUN: "true"
          INVERSE: ${{ inputs.inverse || 'false' }}
