name: Test Action
on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to render"
        required: true
        default: "HI"
      start_date:
        description: "Start date (YYYY-MM-DD), defaults to today"
        required: false
      dry_run:
        description: "Preview only (no push)"
        type: boolean
        default: true
      inverse:
        description: "Invert colors"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: qte77/gha-contribution-ascii@v2.0.1
        with:
          TEXT: ${{ inputs.text }}
          TOKEN: ${{ secrets.CONTRIBUTION_PAT || secrets.GITHUB_TOKEN }}
          START_DATE: ${{ inputs.start_date }}
          DRY_RUN: ${{ inputs.dry_run }}
          INVERSE: ${{ inputs.inverse || 'false' }}
