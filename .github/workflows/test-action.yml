name: Test Action (Dry Run)
on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to render"
        required: true
        default: "HI"
      inverse:
        description: "Invert colors"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          TEXT: ${{ inputs.text }}
          TOKEN: ${{ secrets.CONTRIBUTION_PAT }}
          DRY_RUN: "true"
          INVERSE: ${{ inputs.inverse || 'false' }}
