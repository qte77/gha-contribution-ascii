name: Paint Contribution Graph
on:
  # schedule:
  #   - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      text:
        description: "Text to render"
        required: true
        default: "HI"
      dry_run:
        description: "Preview only (no push)"
        type: boolean
        default: false
      start_date:
        description: "Start date (YYYY-MM-DD), defaults to today"
        required: false
      inverse:
        description: "Invert colors"
        type: boolean
        default: false

permissions:
  contents: write

env:
  DEFAULT_TEXT: "HI"

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - uses: qte77/gha-contribution-ascii@v1
        with:
          TEXT: ${{ inputs.text || env.DEFAULT_TEXT }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_DATE: ${{ inputs.start_date }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INVERSE: ${{ inputs.inverse || 'false' }}
