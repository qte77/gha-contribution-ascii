name: Paint Contribution Graph
on:
  # schedule:
  #   - cron: '0 6 * * *'  # daily at 06:00 UTC — uncomment to enable
  workflow_dispatch:
    inputs:
      text:
        description: "Text to render"
        required: true
        default: "HI"
      dry_run:
        description: "Preview only (no push)"
        type: boolean
        default: true
      inverse:
        description: "Invert colors"
        type: boolean
        default: false

env:
  DEFAULT_TEXT: "HI"

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          TEXT: ${{ inputs.text || env.DEFAULT_TEXT }}
          TOKEN: ${{ secrets.CONTRIBUTION_PAT }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INVERSE: ${{ inputs.inverse || 'false' }}
