# https://docs.github.com/en/actions/sharing-automations/creating-actions/creating-a-composite-action
name: "Contribution Graph ASCII"
description: "Write ASCII text on your GitHub contribution graph with interference compensation."
author: "qte77"
branding:
  icon: "grid"
  color: "green"
inputs:
  TEXT:
    description: "ASCII text to render on the contribution graph."
    required: true
  TOKEN:
    description: "GitHub token. Defaults to GITHUB_TOKEN (contents:write)."
    default: ""
  INTENSITY:
    description: "Fallback commit count when COMPENSATE is off. When on, auto-computed from your max."
    default: "4"
  INVERSE:
    description: "Invert colors (dark=high intensity). Helps with existing contributions."
    default: "false"
  START_DATE:
    description: "Start date for rendering (YYYY-MM-DD). Default: today, adjusted to Sunday."
    default: ""
  COMPENSATE:
    description: "Query existing contributions and adjust commit counts."
    default: "true"
  DRY_RUN:
    description: "Preview bitmap and commit plan without pushing."
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Checkout current repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.TOKEN || github.token }}

    - name: Render and paint contribution graph
      shell: bash
      env:
        INPUT_TEXT: ${{ inputs.TEXT }}
        INPUT_TOKEN: ${{ inputs.TOKEN || github.token }}
        INPUT_INTENSITY: ${{ inputs.INTENSITY }}
        INPUT_INVERSE: ${{ inputs.INVERSE }}
        INPUT_START_DATE: ${{ inputs.START_DATE }}
        INPUT_COMPENSATE: ${{ inputs.COMPENSATE }}
        INPUT_DRY_RUN: ${{ inputs.DRY_RUN }}
        INPUT_GITHUB_ACTOR: ${{ github.actor }}
        GH_TOKEN: ${{ inputs.TOKEN || github.token }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/"*.sh
        "${{ github.action_path }}/scripts/main.sh"
